<html>
    <head>
        <title>
            CSS demo
        </title>
      <!--<link href="main.css" rel="stylesheet">-->
      <style>
       p{
                font-size: 200%;
                border-left:20px solid red;
                border-top:10px double violet;
                border-right:20px ridge blue;
                border-bottom:10px groove yellow;
                box-shadow: 5px 10px 10px black;
                height:80px;
                width:440px;
                text-decoration: underline;
                text-transform: uppercase;


            }
            .p1{
                background-color:rgb(190,140,241);
                Color:#fdddff;
            }
            #p2{
                background-color: yellow;
                color: #00cd11;
            }
            </style>
    </head>
    <body>
        <p class="p1">this is para 1</p>
        <p id="p2">this is para 2</p>
        <p style="color:red;">this is para 2</p>
    </body>
</html>
